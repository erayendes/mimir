name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        env:
          REF: ${{ github.ref_name }}
        run: echo "VERSION=${REF#v}" >> $GITHUB_OUTPUT

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-swiftpm-

      - name: Build release
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          SKIP_ZIP: "true"
        run: |
          attempt=1
          until ./script/release.sh "$VERSION"; do
            [ $attempt -ge 3 ] && echo "Build failed after 3 attempts." && exit 1
            echo "Retrying in $((attempt * 15))s (attempt $((attempt+1))/3)..."
            sleep $((attempt * 15))
            attempt=$((attempt+1))
          done

      - name: Upload dSYM to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=2.46.0 bash
          sentry-cli debug-files upload --org milowda --project mimir "dist/Mimir.app.dSYM"

      - name: Import signing certificate
        env:
          CERT_DATA: ${{ secrets.DEVELOPER_ID_CERT }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_DATA" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Sign app
        run: |
          codesign --force --deep --sign "Developer ID Application: Eray Endes (926AC5V2UG)" \
            --options runtime \
            --timestamp \
            dist/Mimir.app

      - name: Notarize
        env:
          NOTARIZATION_API_KEY: ${{ secrets.NOTARIZATION_API_KEY }}
          NOTARIZATION_API_KEY_ID: ${{ secrets.NOTARIZATION_API_KEY_ID }}
          NOTARIZATION_API_ISSUER: ${{ secrets.NOTARIZATION_API_ISSUER }}
        run: |
          echo "$NOTARIZATION_API_KEY" | base64 --decode > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          ditto -c -k --keepParent dist/Mimir.app /tmp/mimir_notarize.zip
          xcrun notarytool submit /tmp/mimir_notarize.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$NOTARIZATION_API_KEY_ID" \
            --issuer "$NOTARIZATION_API_ISSUER" \
            --wait
          xcrun stapler staple dist/Mimir.app
          rm -f /tmp/mimir_notarize.zip /tmp/AuthKey.p8

      - name: Package
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ZIP="dist/Mimir-${VERSION}.zip"
          cd dist && zip -qr "Mimir-${VERSION}.zip" Mimir.app && cd ..
          echo "SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "ZIP=$ZIP" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          ZIP: ${{ steps.sha.outputs.ZIP }}
          SHA256: ${{ steps.sha.outputs.SHA256 }}
        run: |
          awk "/^### \[${VERSION}\]/{found=1; next} found && /^### \[/{exit} found{print}" CHANGELOG.md > release_notes.md
          echo "" >> release_notes.md
          echo "**SHA256:** \`${SHA256}\`" >> release_notes.md
          gh release create "v${VERSION}" \
            --title "Mimir v${VERSION}" \
            --notes-file release_notes.md \
            "$ZIP"
