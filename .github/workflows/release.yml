name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SIGN_IDENTITY: "Developer ID Application: Eray Endes (926AC5V2UG)"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          REF: ${{ github.ref_name }}
        run: echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-swiftpm-

      # Build + assemble the (unsigned) bundle and dSYM. CI owns signing/publishing.
      - name: Build bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          attempt=1
          until BUILD_ONLY=1 ./script/release.sh "$VERSION"; do
            [ $attempt -ge 3 ] && echo "Build failed after 3 attempts." && exit 1
            echo "Retrying in $((attempt * 15))s (attempt $((attempt+1))/3)..."
            sleep $((attempt * 15))
            attempt=$((attempt+1))
          done

      - name: Import signing certificate
        env:
          CERT_DATA: ${{ secrets.DEVELOPER_ID_CERT }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_DATA" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Sign app (Developer ID, hardened runtime)
        run: |
          codesign --force --deep --sign "$SIGN_IDENTITY" \
            --options runtime \
            --timestamp \
            dist/Mimir.app
          codesign --verify --deep --strict --verbose=2 dist/Mimir.app

      - name: Notarize
        env:
          NOTARIZATION_API_KEY: ${{ secrets.NOTARIZATION_API_KEY }}
          NOTARIZATION_API_KEY_ID: ${{ secrets.NOTARIZATION_API_KEY_ID }}
          NOTARIZATION_API_ISSUER: ${{ secrets.NOTARIZATION_API_ISSUER }}
        run: |
          echo "$NOTARIZATION_API_KEY" | base64 --decode > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          ditto -c -k --keepParent dist/Mimir.app /tmp/mimir_notarize.zip
          xcrun notarytool submit /tmp/mimir_notarize.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$NOTARIZATION_API_KEY_ID" \
            --issuer "$NOTARIZATION_API_ISSUER" \
            --wait
          xcrun stapler staple dist/Mimir.app
          rm -f /tmp/mimir_notarize.zip /tmp/AuthKey.p8

      - name: Upload dSYM to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=2.46.0 bash
          sentry-cli debug-files upload --org milowda --project mimir "dist/Mimir.app.dSYM"

      # Zip the *stapled* app. The asset MUST be named Mimir.zip — the appcast
      # enclosure URL points at .../v${VERSION}/Mimir.zip.
      - name: Package
        id: pkg
        run: |
          cd dist
          rm -f Mimir.zip
          zip -r --symlinks Mimir.zip Mimir.app --quiet
          cd ..
          echo "LENGTH=$(wc -c < dist/Mimir.zip | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "SHA256=$(shasum -a 256 dist/Mimir.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Sign update for Sparkle
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE="$(find .build/artifacts -name sign_update -not -path '*/old_dsa*' -type f | head -1)"
          KEY_DIR="$(mktemp -d)"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_DIR/key"
          ED_SIG="$("$SIGN_UPDATE" --ed-key-file "$KEY_DIR/key" dist/Mimir.zip | grep -oE 'edSignature="[^"]+"' | cut -d'"' -f2)"
          rm -rf "$KEY_DIR"
          if [ -z "$ED_SIG" ]; then echo "✗ sign_update produced no signature" >&2; exit 1; fi
          echo "ED_SIG=$ED_SIG" >> "$GITHUB_OUTPUT"

      # Update appcast on main and push it back. The release tag is cut from main's
      # HEAD, so checking out main lands on the same tree; dist/ is gitignored and
      # survives the checkout.
      - name: Update appcast on main
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ED_SIG: ${{ steps.sparkle.outputs.ED_SIG }}
          LENGTH: ${{ steps.pkg.outputs.LENGTH }}
        run: |
          BUILD_NUMBER="$(bash script/build_number.sh "$VERSION")"
          # Bilingual notes: English block first, then Turkish, pulled from CHANGELOG.
          EN="$(awk -v v="$VERSION" '/^## English/{s="en"} /^## Türkçe/{s="tr"} s=="en" && $0 ~ "^### \\["v"\\]"{c=1;next} c&&/^### \[/{c=0} c{print}' CHANGELOG.md)"
          TR="$(awk -v v="$VERSION" '/^## English/{s="en"} /^## Türkçe/{s="tr"} s=="tr" && $0 ~ "^### \\["v"\\]"{c=1;next} c&&/^### \[/{c=0} c{print}' CHANGELOG.md)"
          NOTES="$(printf '%s\n\n---\n\n%s\n' "$EN" "$TR")"
          printf '%s' "$NOTES" > /tmp/release_notes.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          python3 script/gen_appcast_item.py \
            --version "$VERSION" \
            --build-number "$BUILD_NUMBER" \
            --url "https://github.com/erayendes/mimir/releases/download/v${VERSION}/Mimir.zip" \
            --signature "$ED_SIG" \
            --length "$LENGTH" \
            --notes "$NOTES" \
            --appcast appcast.xml
          git add appcast.xml
          git commit -m "chore: appcast v$VERSION" || echo "appcast unchanged"
          git push origin main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256: ${{ steps.pkg.outputs.SHA256 }}
        run: |
          { cat /tmp/release_notes.md; printf '\n\n**SHA256:** `%s`\n' "$SHA256"; } > /tmp/gh_notes.md
          gh release create "v${VERSION}" dist/Mimir.zip \
            --title "Mimir v${VERSION}" \
            --notes-file /tmp/gh_notes.md
